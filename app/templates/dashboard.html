{% extends "base.html" %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/overview.css') }}">
{% endblock %}

{% block content %}
<div class="ov-page" id="valPage">

    <!-- Page header -->
    <div class="ov-header">
        <div>
            <h4 class="mb-0 fw-semibold"><i class="bi bi-shield-check me-2 text-primary"></i>Data Validation</h4>
            <div class="text-muted" style="font-size:0.85rem">Select a table and run quality checks, or write custom SQL</div>
        </div>
        <ul class="nav nav-pills gap-1" id="valModeTabs">
            <li class="nav-item">
                <button class="nav-link active py-1 px-3" id="tabStandard" onclick="switchValMode('standard')">
                    <i class="bi bi-check2-square me-1"></i>Standard
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link py-1 px-3" id="tabQuery" onclick="switchValMode('query')">
                    <i class="bi bi-code-slash me-1"></i>Query
                </button>
            </li>
        </ul>
    </div>

    <!-- ── Standard Mode ─────────────────────────────────────────────────── -->
    <div id="modeStandard">
        <div class="ov-card mb-3">
            <div class="ov-card-header">
                <span class="fw-semibold"><i class="bi bi-funnel me-2 text-primary"></i>Select Source</span>
                <span id="valSourceMeta" class="text-muted" style="font-size:0.78rem"></span>
            </div>
            <div style="padding:16px">
                <div class="row g-3">
                    <div class="col-sm-6 col-lg-4">
                        <label class="ov-label">Database</label>
                        <select class="form-select form-select-sm" id="valDbSelect" onchange="onValDbChange()">
                            <option value="">— loading —</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="ov-label">Schema</label>
                        <select class="form-select form-select-sm" id="valSchemaSelect" onchange="onValSchemaChange()" disabled>
                            <option value="">— select schema —</option>
                        </select>
                    </div>
                    <div class="col-sm-6 col-lg-4">
                        <label class="ov-label">Table</label>
                        <select class="form-select form-select-sm" id="valTableSelect" onchange="onValTableChange()" disabled>
                            <option value="">— select table —</option>
                        </select>
                    </div>
                </div>

                <!-- Options (revealed after table is picked) -->
                <div id="valOptions" style="display:none">
                    <hr class="my-3">
                    <div class="row g-3">
                        <div class="col-sm-6 col-lg-4">
                            <label class="ov-label">Key Column <span class="text-muted fw-normal">(optional)</span></label>
                            <select class="form-select form-select-sm" id="valKeySelect">
                                <option value="">— none —</option>
                            </select>
                        </div>
                        <div class="col-sm-6 col-lg-4">
                            <label class="ov-label">Foreign Key <span class="text-muted fw-normal">(optional)</span></label>
                            <select class="form-select form-select-sm" id="valFkSelect">
                                <option value="">— none —</option>
                            </select>
                        </div>
                        <div class="col-sm-6 col-lg-4">
                            <label class="ov-label">Date Column <span class="text-muted fw-normal">(optional)</span></label>
                            <select class="form-select form-select-sm" id="valDateColSelect" onchange="onValDateColChange()">
                                <option value="">— none —</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mt-0" id="valDateRange" style="display:none">
                        <div class="col-sm-4 col-lg-2">
                            <label class="ov-label">From</label>
                            <input type="date" class="form-control form-control-sm" id="valStartDate">
                        </div>
                        <div class="col-sm-4 col-lg-2">
                            <label class="ov-label">To</label>
                            <input type="date" class="form-control form-control-sm" id="valEndDate">
                        </div>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-sm btn-primary d-inline-flex align-items-center gap-2"
                                id="valRunBtn" onclick="runStandardValidation()">
                            <i class="bi bi-play-fill"></i>Run Validation
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="valResults"></div>
    </div>

    <!-- ── Query Mode ─────────────────────────────────────────────────────── -->
    <div id="modeQuery" style="display:none">
        <div class="ov-card mb-3">
            <div class="ov-card-header">
                <span class="fw-semibold"><i class="bi bi-code-slash me-2" style="color:#f59e0b"></i>Query Validation</span>
            </div>
            <div style="padding:16px">
                <div class="row g-3 mb-3">
                    <div class="col-sm-6 col-lg-3">
                        <label class="ov-label">Database</label>
                        <select class="form-select form-select-sm" id="qryDbSelect">
                            <option value="">— loading —</option>
                        </select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="ov-label">SQL Query</label>
                    <textarea class="form-control form-control-sm font-monospace" id="sqlQuery" rows="6"
                              placeholder="SELECT * FROM my_schema.my_table WHERE ..."></textarea>
                </div>
                <button class="btn btn-sm btn-warning text-dark d-inline-flex align-items-center gap-2"
                        id="qryRunBtn" onclick="runQueryValidation(this)">
                    <i class="bi bi-play-fill"></i>Validate Query
                </button>
            </div>
        </div>
        <div id="qryResults"></div>
    </div>

</div><!-- /.ov-page -->

<script src="{{ url_for('static', filename='js/validation.js') }}"></script>
{% endblock %}
