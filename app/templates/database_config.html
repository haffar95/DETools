{% extends "base.html" %}

{% block content %}
<div class="validation-container">
    <h1 class="page-title">Database Configuration</h1>
    
    <div class="selection-panel">
        <h3>Add New Database</h3>
        <form action="{{ url_for('add_database_config') }}" method="post">
            <div class="select-group">
                <label for="db_name">Database Name:</label>
                <input type="text" id="db_name" name="db_name" required class="form-input">
            </div>
            
            <div class="select-group">
                <label for="db_type">Database Type:</label>
                <select id="db_type" name="db_type" required onchange="toggleConnectionFields()">
                    <option value="postgres">PostgreSQL</option>
                    <option value="snowflake">Snowflake</option>
                </select>
            </div>
            
            <!-- PostgreSQL Fields -->
            <div id="postgres-fields">
                <div class="select-group">
                    <label for="db_host">Host:</label>
                    <input type="text" id="db_host" name="db_host" class="form-input">
                </div>
                
                <div class="select-group">
                    <label for="db_port">Port:</label>
                    <input type="number" id="db_port" name="db_port" class="form-input" value="5432">
                </div>

                <div class="select-group">
                    <label for="db_database">Database:</label>
                    <input type="text" id="db_database" name="db_database" class="form-input" required>
                </div>
            </div>
            
            <!-- Snowflake Fields -->
            <div id="snowflake-fields" style="display: none;">
                <div class="select-group">
                    <label for="db_account">Account:</label>
                    <input type="text" id="db_account" name="db_account" class="form-input" placeholder="e.g., xy12345.us-east-1">
                </div>
                
                <div class="select-group">
                    <label for="db_warehouse">Warehouse:</label>
                    <input type="text" id="db_warehouse" name="db_warehouse" class="form-input">
                </div>
                
                <div class="select-group">
                    <label for="db_role">Role:</label>
                    <input type="text" id="db_role" name="db_role" class="form-input">
                </div>

                <div class="select-group">
                    <label for="db_database">Database:</label>
                    <input type="text" id="db_database" name="db_database" class="form-input">
                </div>
            </div>
            
            <div class="select-group">
                <label for="db_user">Username:</label>
                <input type="text" id="db_user" name="db_user" required class="form-input">
            </div>
            
            <div class="select-group">
                <label for="db_password">Password:</label>
                <input type="password" id="db_password" name="db_password" required class="form-input">
            </div>
            
            <button type="submit" class="primary-button">Add Database</button>
        </form>
    </div>

    <div class="results-panel">
        <h3>Manage Databases</h3>
        <div class="database-list">
            {% for db in databases %}
            <div class="database-item">
                <div class="database-info">
                    <span class="database-name">{{ db.name.split('_')[0] }} ({{ db.type }})</span>
                    <form action="{{ url_for('select_database') }}" method="post" class="inline-form" onsubmit="handleDatabaseSelection(this)">
                        <input type="hidden" name="selected_db" value="{{ db.name }}">
                        <button type="submit" class="secondary-button">Select</button>
                    </form>
                    <form action="{{ url_for('delete_database') }}" method="post" class="inline-form">
                        <input type="hidden" name="db_name" value="{{ db.name }}">
                        <button type="submit" class="danger-button" onclick="return confirm('Are you sure you want to delete this database configuration?')">Delete</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
function handleDatabaseSelection(form) {
    // Prevent default form submission
    event.preventDefault();
    
    // Submit the form using fetch
    fetch(form.action, {
        method: 'POST',
        body: new FormData(form)
    })
    .then(response => {
        if (response.redirected) {
            // If the server redirects, follow the redirect
            window.location.href = response.url;
        } else {
            // If no redirect, update the indicator
            return fetch('/api/current-database')
                .then(response => response.json())
                .then(data => {
                    const indicator = document.getElementById('currentDbIndicator');
                    if (data.selected_db) {
                        indicator.innerHTML = `
                            <span class="icon">🔌</span>
                            <span class="db-name">${data.selected_db.name}</span>
                            <span class="db-type">${data.selected_db.type}</span>
                        `;
                        indicator.classList.remove('no-db-selected');
                    }
                });
        }
    })
    .catch(error => console.error('Error:', error));
}

function toggleConnectionFields() {
    const dbType = document.getElementById('db_type').value;
    const postgresFields = document.getElementById('postgres-fields');
    const snowflakeFields = document.getElementById('snowflake-fields');
    
    if (dbType === 'postgres') {
        postgresFields.style.display = 'block';
        snowflakeFields.style.display = 'none';
        document.getElementById('db_host').required = true;
        document.getElementById('db_port').required = true;
        document.getElementById('db_database').required = true;
        document.getElementById('db_account').required = false;
        document.getElementById('db_warehouse').required = false;
        document.getElementById('db_role').required = false;
    } else {
        postgresFields.style.display = 'none';
        snowflakeFields.style.display = 'block';
        document.getElementById('db_host').required = false;
        document.getElementById('db_port').required = false;
        document.getElementById('db_account').required = true;
        document.getElementById('db_warehouse').required = true;
        document.getElementById('db_role').required = true;
        document.getElementById('db_database').required = true;
    }
}

// Initialize fields on page load
document.addEventListener('DOMContentLoaded', function() {
    toggleConnectionFields();
});
</script>
{% endblock %}
