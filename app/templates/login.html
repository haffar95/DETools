{% extends "login_base.html" %}

{% block content %}
<div class="card login-card">
    <div class="card-header">
        <svg width="48" height="48" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="mb-2" style="flex-shrink:0">
            <defs>
                <linearGradient id="deLgLogin" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#4f46e5"/>
                    <stop offset="1" stop-color="#06b6d4"/>
                </linearGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="url(#deLgLogin)"/>
            <rect x="7" y="9.5"  width="18" height="3" rx="1.5" fill="white"/>
            <rect x="7" y="14.5" width="13" height="3" rx="1.5" fill="white" opacity="0.7"/>
            <rect x="7" y="19.5" width="8"  height="3" rx="1.5" fill="white" opacity="0.45"/>
        </svg>
        <h4 class="mb-0">DETools</h4>
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label small fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
            </div>
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right me-1"></i>Sign In</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
