<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETools - Login</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon/9952733.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1); border: none; }
        .login-card .card-header { background: #1e293b; color: white; border-radius: 12px 12px 0 0 !important; text-align: center; padding: 24px; }
        .login-card .card-body { padding: 32px; }
        .form-control { border-radius: 6px; padding: 10px 14px; }
        .btn-primary { background: #3b82f6; border: none; border-radius: 6px; padding: 10px; font-weight: 500; }
        .btn-primary:hover { background: #2563eb; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
